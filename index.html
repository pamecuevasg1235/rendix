<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rendix Pro</title>

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
    margin:0;
    padding:0;
    background:#071330;
    color:white;
    font-family:Arial,sans-serif;
}

.container{
    max-width:650px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    font-size:52px;
    margin-bottom:5px;
}

.sub{
    text-align:center;
    color:#9db2d8;
    margin-bottom:25px;
}

.card{
    background:#13213f;
    border-radius:25px;
    padding:25px;
    margin-bottom:20px;
}

.total{
    font-size:60px;
    font-weight:bold;
    color:#00e28f;
    text-align:center;
}

button{
    width:100%;
    border:none;
    border-radius:18px;
    padding:18px;
    margin-top:12px;
    font-size:18px;
    font-weight:bold;
    color:white;
}

.scan{
    background:#2d63f0;
}

.manual{
    background:#865dff;
}

.share{
    background:#12c48b;
}

.reset{
    background:#ff9800;
}

.item{
    background:#10203d;
    border-radius:18px;
    padding:15px;
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.nombre{
    font-size:18px;
    font-weight:bold;
}

.monto{
    color:#00e28f;
    margin-top:4px;
    font-size:18px;
}

.factura{
    color:#9db2d8;
    margin-top:5px;
    font-size:14px;
}

.eliminar{
    background:#ff4d4d;
    width:auto;
    padding:10px 14px;
    margin:0;
}

#estado{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
    color:#ffd24d;
}

.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#13213f;
    width:85%;
    padding:25px;
    border-radius:20px;
}

input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    margin-top:12px;
    font-size:17px;
    box-sizing:border-box;
}

.guardar{
    background:#12c48b;
}

.cerrar{
    background:#ff5b5b;
}

</style>
</head>

<body>

<div class="container">

<h1>📱 Rendix Pro</h1>
<div class="sub">Controla y comparte tus rendiciones</div>

<div class="card">
<h3>Total Gastos</h3>
<div class="total" id="total">$0</div>
</div>

<button class="scan" onclick="escanearBoleta()">
📸 Escanear Boleta
</button>

<button class="manual" onclick="abrirManual()">
✍️ Agregar Manualmente
</button>

<button class="share" onclick="compartir()">
📤 Compartir Rendición
</button>

<button class="reset" onclick="nuevaRendicion()">
🗑️ Nueva Rendición
</button>

<div id="estado"></div>

<div id="lista"></div>

</div>

<div class="modal" id="modal">

<div class="modal-content">

<h2>Nuevo Gasto</h2>

<input type="text" id="nombreManual"
placeholder="Lugar / Comercio">

<input type="text" id="facturaManual"
placeholder="Número de factura">

<input type="number" id="montoManual"
placeholder="Monto">

<button class="guardar" onclick="guardarManual()">
Guardar
</button>

<button class="cerrar" onclick="cerrarManual()">
Cerrar
</button>

</div>

</div>

<script>

let gastos = JSON.parse(localStorage.getItem("gastos")) || [];

mostrar();

function guardar(){
    localStorage.setItem("gastos", JSON.stringify(gastos));
}

function mostrar(){

    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    let total = 0;

    gastos.forEach(g=>{

        total += g.monto;

        lista.innerHTML += `
        <div class="item">

            <div>
                <div class="nombre">${g.nombre}</div>

                <div class="monto">
                $${g.monto.toLocaleString("es-CL")}
                </div>

                <div class="factura">
                ${g.numeroFactura ? "Factura: " + g.numeroFactura : ""}
                </div>
            </div>

            <button class="eliminar"
            onclick="eliminar(${g.id})">
            ✖
            </button>

        </div>
        `;
    });

    document.getElementById("total").innerText =
    "$" + total.toLocaleString("es-CL");
}

function eliminar(id){

    gastos = gastos.filter(g=>g.id !== id);

    guardar();

    mostrar();
}

function nuevaRendicion(){

    if(confirm("¿Comenzar nueva rendición?")){

        gastos = [];

        guardar();

        mostrar();
    }
}

function abrirManual(){

    document.getElementById("modal").style.display = "flex";
}

function cerrarManual(){

    document.getElementById("modal").style.display = "none";
}

function guardarManual(){

    let nombre =
    document.getElementById("nombreManual").value;

    let factura =
    document.getElementById("facturaManual").value;

    let monto =
    parseInt(document.getElementById("montoManual").value);

    if(!nombre || !monto){
        alert("Completa los datos");
        return;
    }

    gastos.push({
        id:Date.now(),
        nombre,
        monto,
        numeroFactura:factura
    });

    guardar();

    mostrar();

    cerrarManual();

    document.getElementById("nombreManual").value="";
    document.getElementById("facturaManual").value="";
    document.getElementById("montoManual").value="";
}

async function escanearBoleta(){

    let input = document.createElement("input");

    input.type = "file";
    input.accept = "image/*";
    input.capture = "environment";

    input.onchange = async e => {

        let file = e.target.files[0];

        if(!file) return;

        document.getElementById("estado").innerText =
        "⏳ Leyendo boleta...";

        try{

            const { data:{ text } } =
            await Tesseract.recognize(file,"spa");

            console.log(text);

            let lineas = text.split("\n");

            let nombre = "Boleta";
            let total = null;
            let factura = "";

            for(let linea of lineas){

                let txt = linea.toUpperCase();

                if(txt.includes("LIDER")){
                    nombre = "Supermercado Lider";
                }

                else if(txt.includes("UNIMARC")){
                    nombre = "Unimarc";
                }

                else if(txt.includes("COPEC")){
                    nombre = "Copec";
                }

                else if(txt.includes("SANTA ISABEL")){
                    nombre = "Santa Isabel";
                }

                else if(txt.includes("JUMBO")){
                    nombre = "Jumbo";
                }

                else if(txt.includes("ACUENTA")){
                    nombre = "Acuenta";
                }

                if(
                    txt.includes("FACTURA") ||
                    txt.includes("FOLIO") ||
                    txt.includes("DOCUMENTO")
                ){

                    let num = linea.match(/\d{3,}/);

                    if(num){
                        factura = num[0];
                    }
                }

                if(
                    txt.includes("TOTAL") ||
                    txt.includes("TOTAL VENTA") ||
                    txt.includes("TOTAL:") ||
                    txt.includes("MONTO TOTAL") ||
                    txt.includes("TOTAL A PAGAR") ||
                    txt.includes("TOTAI")
                ){

                    let encontrado =
                    linea.match(/\$?\s?\d{1,3}(?:[.\,]\d{3})+/);

                    if(encontrado){

                        total = parseInt(
                            encontrado[0]
                            .replace(/\$/g,"")
                            .replace(/\./g,"")
                            .replace(/,/g,"")
                        );
                    }
                }
            }

            if(!total){

                let numeros =
                text.match(/\$?\s?\d{1,3}(?:[.\,]\d{3})+/g);

                if(numeros){

                    let montos = numeros.map(n=>{
                        return parseInt(
                            n.replace(/\$/g,"")
                             .replace(/\./g,"")
                             .replace(/,/g,"")
                        );
                    });

                    total = montos[montos.length-1];
                }
            }

            if(!total){

                alert("No pude leer el total. Agrégalo manualmente.");

                document.getElementById("estado").innerText="";

                return;
            }

            let existe = gastos.some(g =>
                g.nombre === nombre &&
                g.monto === total &&
                g.numeroFactura === factura
            );

            if(existe){

                alert("Boleta ya agregada");

                document.getElementById("estado").innerText="";

                return;
            }

            gastos.push({
                id:Date.now(),
                nombre,
                monto:total,
                numeroFactura:factura
            });

            guardar();

            mostrar();

            document.getElementById("estado").innerText =
            "✅ Boleta agregada";

        }catch(err){

            console.log(err);

            alert("Error leyendo boleta");

            document.getElementById("estado").innerText="";
        }
    };

    input.click();
}

function compartir(){

    let texto =
`📋 RENDICIÓN DE GASTOS

`;

    gastos.forEach(g=>{

        texto +=
`────────────────────
Factura: ${g.numeroFactura || "-"}
Lugar: ${g.nombre}
Total: $${g.monto.toLocaleString("es-CL")}
────────────────────

`;
    });

    let total =
    gastos.reduce((a,b)=>a+b.monto,0);

    texto +=
`TOTAL GENERAL: $${total.toLocaleString("es-CL")}`;

    if(navigator.share){

        navigator.share({
            title:"Rendix Pro",
            text:texto
        });

    }else{

        navigator.clipboard.writeText(texto);

        alert("Resumen copiado");
    }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rendix</title>

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
    margin:0;
    padding:0;
    background:#071330;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

.container{
    padding:30px;
}

h1{
    font-size:60px;
    margin-bottom:10px;
}

button{
    width:100%;
    border:none;
    border-radius:25px;
    padding:28px;
    font-size:22px;
    font-weight:bold;
    margin-top:20px;
    color:white;
}

.nueva{
    background:#f7a400;
}

.scan{
    background:#2d63f0;
}

.share{
    background:#12c48b;
}

.card{
    background:#1a2745;
    border-radius:25px;
    padding:30px;
    margin-top:25px;
}

.total{
    color:#00e28f;
    font-size:70px;
    font-weight:bold;
}

#estado{
    color:#ffd24d;
    font-size:20px;
    margin-top:10px;
    font-weight:bold;
}

.lista{
    margin-top:20px;
    text-align:left;
}

.item{
    background:#12203d;
    padding:15px;
    border-radius:15px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.eliminar{
    background:red;
    border:none;
    color:white;
    padding:10px 15px;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>📱 Rendix</h1>

<button class="nueva" onclick="nuevaRendicion()">
➕ Nueva Rendición
</button>

<div class="card">
<h3>Total Gastos</h3>
<div class="total" id="total">$0</div>
</div>

<button class="scan" onclick="escanearBoleta()">
📸 Escanear Boleta
</button>

<div id="estado"></div>

<button class="share" onclick="compartir()">
📤 Compartir Rendición
</button>

<div class="lista" id="lista"></div>

</div>

<script>

let gastos = JSON.parse(localStorage.getItem("gastos")) || [];

mostrar();

function guardar(){
    localStorage.setItem("gastos", JSON.stringify(gastos));
}

function nuevaRendicion(){

    if(confirm("¿Borrar rendición actual y comenzar otra?")){
        gastos = [];
        guardar();
        mostrar();
    }
}

function agregarGasto(gasto){

    let existe = gastos.some(g =>
        g.monto === gasto.monto &&
        g.nombre === gasto.nombre
    );

    if(existe){
        alert("Esta boleta ya fue agregada");
        return;
    }

    gastos.push({
        id:Date.now(),
        nombre:gasto.nombre,
        monto:gasto.monto
    });

    guardar();
    mostrar();
}

function eliminar(id){

    gastos = gastos.filter(g => g.id !== id);

    guardar();
    mostrar();
}

function mostrar(){

    let lista = document.getElementById("lista");
    let total = 0;

    lista.innerHTML = "";

    gastos.forEach(g=>{

        total += g.monto;

        lista.innerHTML += `
        <div class="item">
            <div>
                <strong>${g.nombre}</strong><br>
                $${g.monto.toLocaleString("es-CL")}
            </div>

            <button class="eliminar"
            onclick="eliminar(${g.id})">
            ✖
            </button>
        </div>
        `;
    });

    document.getElementById("total").innerText =
    "$" + total.toLocaleString("es-CL");
}

async function escanearBoleta(){

  let input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.capture = "environment";

  input.onchange = async e => {

    let file = e.target.files[0];
    if(!file) return;

    document.getElementById("estado").innerText =
      "⏳ Leyendo boleta...";

    try{

      const { data:{ text } } =
      await Tesseract.recognize(
        file,
        "spa"
      );

      console.log(text);

      let lineas = text.split("\n");

      let total = null;

      for(let linea of lineas){

        let texto = linea.toUpperCase();

        if(
          texto.includes("TOTAL") ||
          texto.includes("TOTAL VENTA") ||
          texto.includes("MONTO TOTAL")
        ){

          let encontrado =
          linea.match(/\$?\s?\d{1,3}(?:[.\,]\d{3})+/);

          if(encontrado){

            total = parseInt(
              encontrado[0]
              .replace(/\$/g,"")
              .replace(/\./g,"")
              .replace(/,/g,"")
            );

            break;
          }
        }
      }

      if(!total){

        alert("No encontré el total de la boleta");
        document.getElementById("estado").innerText="";
        return;
      }

      agregarGasto({
        nombre:"Boleta",
        monto:total
      });

      document.getElementById("estado").innerText =
      "✅ Boleta agregada";

    }catch(err){

      console.log(err);

      alert("Error leyendo boleta");

      document.getElementById("estado").innerText="";
    }
  };

  input.click();
}

function compartir(){

    let texto = "📋 Rendición de Gastos\n\n";

    gastos.forEach(g=>{
        texto += `${g.nombre}: $${g.monto.toLocaleString("es-CL")}\n`;
    });

    let total = gastos.reduce((a,b)=>a+b.monto,0);

    texto += `\nTOTAL: $${total.toLocaleString("es-CL")}`;

    if(navigator.share){

        navigator.share({
            title:"Rendix",
            text:texto
        });

    }else{

        navigator.clipboard.writeText(texto);

        alert("Resumen copiado. Ahora puedes pegarlo en WhatsApp.");
    }
}

</script>

</body>
</html>
